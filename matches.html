<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tippekonk — Kamptipper</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="topbar-logo" href="dashboard.html">Tippekonk ⚽</a>
      <span class="topbar-user" id="user-name"></span>
    </div>

    <div class="nav-bar">
      <a class="nav-item" href="dashboard.html">Toppliste</a>
      <a class="nav-item active" href="matches.html">Kamptipper</a>
      <a class="nav-item" href="tournament.html">Turnerings­tipper</a>
    </div>

    <div id="no-key-alert" class="alert alert-info hidden" style="margin-bottom:1rem">
      Ingen football-data.org API-nøkkel er satt. Legg til nøkkelen din i <code>js/client.js</code>.
    </div>

    <div class="card">
      <div class="card-header">Kommende kamper</div>
      <ul class="match-list" id="matches-list">
        <li class="loading-state">
          <div class="spinner"></div>
          Henter kamper…
        </li>
      </ul>
    </div>

    <div class="card" id="finished-card" style="display:none">
      <div class="card-header">Spilte kamper</div>
      <ul class="match-list" id="finished-list"></ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="js/matches.js"></script>
</body>
</html>
