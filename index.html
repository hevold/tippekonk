<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tippekonk</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#060b16" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tippekonk" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <script>if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});</script>
</head>
<body>
  <main class="page">
    <h1>Tippekonk</h1>
    <p class="muted">VM 2026. Logg inn eller registrer deg med navn og PIN.</p>

    <div class="card">
      <div class="tabs">
        <button id="tab-login" class="active">Logg inn</button>
        <button id="tab-register">Registrer</button>
      </div>

      <div id="alert-area"></div>

      <form id="auth-form" class="form-body" autocomplete="off">
        <div class="field">
          <label for="name">Navn</label>
          <input id="name" name="name" type="text" autocapitalize="words" required />
        </div>
        <div class="field">
          <label for="pin">PIN (4–8 sifre)</label>
          <input id="pin" name="pin" type="password" inputmode="numeric" pattern="\d{4,8}" required />
        </div>
        <div class="field hidden" id="invite-field">
          <label for="invite-code">Invitasjonskode</label>
          <input id="invite-code" name="invite_code" type="text" autocapitalize="off" autocomplete="off" />
          <small class="muted">Spør Henrik om koden hvis du ikke har den.</small>
        </div>
        <button class="btn" id="submit" type="submit">Logg inn</button>
      </form>
    </div>

    <p class="muted center">Glemt PIN? Be admin om å nullstille i Supabase.</p>
  </main>
  <script type="module" src="js/index.js"></script>
</body>
</html>
