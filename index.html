<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tippekonk — VM 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <div class="page-hero">
      <h1>Tippekonk</h1>
      <p class="tagline">VM 2026 · Privat tippekonkurranse</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Logg inn</button>
        <button class="tab-btn" data-tab="register">Registrer deg</button>
      </div>

      <div class="tab-pane active" id="tab-login">
        <form class="form-body" id="login-form" autocomplete="on">
          <div class="field">
            <label for="login-name">Navn</label>
            <input id="login-name" type="text" autocomplete="username" placeholder="Ditt navn" required>
          </div>
          <div class="field">
            <label for="login-pin">PIN</label>
            <input id="login-pin" type="password" autocomplete="current-password" placeholder="••••" maxlength="8" required>
          </div>
          <div id="login-alert" class="alert alert-error hidden"></div>
          <button type="submit" class="btn btn-primary" id="login-btn">Logg inn</button>
        </form>
      </div>

      <div class="tab-pane" id="tab-register">
        <form class="form-body" id="register-form" autocomplete="on">
          <div class="field">
            <label for="reg-name">Ditt navn</label>
            <input id="reg-name" type="text" autocomplete="username" placeholder="F.eks. Ola Nordmann" required>
          </div>
          <div class="field">
            <label for="reg-pin">Velg PIN <span class="field-hint">(4–8 siffer)</span></label>
            <input id="reg-pin" type="password" autocomplete="new-password" placeholder="••••" pattern="[0-9]{4,8}" maxlength="8" inputmode="numeric" required>
          </div>
          <div class="field">
            <label for="reg-pin2">Bekreft PIN</label>
            <input id="reg-pin2" type="password" autocomplete="new-password" placeholder="••••" maxlength="8" inputmode="numeric" required>
          </div>
          <div id="reg-alert" class="alert alert-error hidden"></div>
          <button type="submit" class="btn btn-primary" id="reg-btn">Opprett konto</button>
        </form>
      </div>
    </div>

    <p class="text-center text-muted mt-2" style="font-size:0.8rem">
      Kun for inviterte deltakere
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="js/index.js"></script>
</body>
</html>
