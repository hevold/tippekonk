<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gruppespill — Tippekonk</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page">
    <nav class="nav-bar">
      <a href="dashboard.html">Hjem</a>
      <a href="gruppespill.html" class="active">Gruppespill</a>

      <span id="hello">Hei</span>
      <button class="btn-link" id="logout">Logg ut</button>
    </div>

    <h1>Gruppespill</h1>
    <p class="muted">Tipp resultatet for alle 72 gruppekampene. Bruk + og − for å justere. Lås opp full tipping (gule/røde kort, første scorer) på enkeltkamp-siden.</p>

    <div class="gs-toolbar">
      <button class="btn btn-secondary" id="autofill-1" type="button">Autofyll 1–1</button>
      <button class="btn btn-secondary" id="autofill-0" type="button">Autofyll 0–0</button>
    </div>

    <div id="alert-area"></div>

    <div id="groups-area">
      <span class="spinner"></span>
    </div>

    <div class="gs-savebar hidden" id="savebar">
      <span class="status" id="status-text">Ingen endringer</span>
      <button class="btn" id="save-btn" disabled>Lagre tipp</button>
    </div>
  </main>
  <script type="module" src="js/gruppespill.js"></script>
</body>
