    <h1>Gruppespill</h1>
    <p class="muted">Tipp resultatet for alle 72 gruppekampene. Bruk + og − for å justere. Lås opp full tipping (gule/røde kort, første scorer) på enkeltkamp-siden.</p>

    <div class="gs-toolbar">
      <button class="btn btn-secondary" id="autofill-1" type="button">Autofyll 1–1</button>
      <button class="btn btn-secondary" id="autofill-0" type="button">Autofyll 0–0</button>
    </div>

    <div id="alert-area"></div>

    <div id="groups-area">
      <span class="spinner"></span>
    </div>

    <div class="gs-savebar hidden" id="savebar">
      <span class="status" id="status-text">Ingen endringer</span>
      <button class="btn" id="save-btn" disabled>Lagre tipp</button>
    </div>
