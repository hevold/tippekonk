<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tippekonk — Turneringstipper</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="topbar-logo" href="dashboard.html">Tippekonk ⚽</a>
      <span class="topbar-user" id="user-name"></span>
    </div>

    <div class="nav-bar">
      <a class="nav-item" href="dashboard.html">Toppliste</a>
      <a class="nav-item" href="matches.html">Kamptipper</a>
      <a class="nav-item active" href="tournament.html">Turnerings­tipper</a>
    </div>

    <div class="card">
      <div class="card-header">Turneringstipper — 5 poeng per korrekt svar</div>
      <form class="form-body" id="tournament-form">
        <div class="section-label">Vinnere og priser</div>
        <div class="field">
          <label for="winner">Turneringsvinner <span class="pts-badge">5p</span></label>
          <input id="winner" type="text" placeholder="F.eks. Brasil" list="teams-list" autocomplete="off">
        </div>
        <div class="field">
          <label for="top-scorer">Toppscorer <span class="pts-badge">5p</span></label>
          <input id="top-scorer" type="text" placeholder="F.eks. Erling Haaland">
        </div>
        <div class="field">
          <label for="golden-glove">Gullhanske (beste keeper) <span class="pts-badge">5p</span></label>
          <input id="golden-glove" type="text" placeholder="F.eks. Alisson">
        </div>
        <div class="section-label">Statistikk</div>
        <div class="field">
          <label for="most-goals-team">Lag med flest mål totalt <span class="pts-badge">5p</span></label>
          <input id="most-goals-team" type="text" placeholder="F.eks. Frankrike" list="teams-list" autocomplete="off">
        </div>
        <div class="field">
          <label for="most-yellow-team">Lag med flest gule kort <span class="pts-badge">5p</span></label>
          <input id="most-yellow-team" type="text" placeholder="F.eks. Argentina" list="teams-list" autocomplete="off">
        </div>
        <div class="field">
          <label for="most-red-team">Lag med flest røde kort <span class="pts-badge">5p</span></label>
          <input id="most-red-team" type="text" placeholder="F.eks. Colombia" list="teams-list" autocomplete="off">
        </div>
        <div class="field">
          <label for="total-goals">Totalt antall mål i turneringen <span class="pts-badge">5p</span></label>
          <input id="total-goals" type="number" min="0" max="500" placeholder="F.eks. 170">
          <span class="field-hint">Innen ±5 mål fra fasit gir poeng</span>
        </div>
        <div class="section-label">Finalen</div>
        <div class="field">
          <label>Vil finalen gå til ekstraomganger? <span class="pts-badge">5p</span></label>
          <div class="toggle-group" id="extra-time-toggle">
            <button type="button" class="toggle-btn" data-val="true">Ja</button>
            <button type="button" class="toggle-btn" data-val="false">Nei</button>
          </div>
          <input type="hidden" id="extra-time-val" value="">
        </div>
        <datalist id="teams-list"></datalist>
        <div id="tournament-alert" class="alert alert-error hidden"></div>
        <div id="tournament-success" class="alert alert-success hidden">Tipset er lagret ✓</div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Lagre turneringstipper</button>
      </form>
    </div>
    <p class="text-muted text-center mt-2" style="font-size:0.8rem">Kun eksakt treff gir poeng (unntatt totale mål: ±5)</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="js/tournament.js"></script>
</body>
</html>
